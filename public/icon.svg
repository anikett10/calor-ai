<svg width="180" height="180" viewBox="0 0 180 180" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    @media (prefers-color-scheme: light) {
      .background { fill: #F8F9FA; }
      .foreground { fill: #10B981; }
      .accent { fill: #059669; }
    }
    @media (prefers-color-scheme: dark) {
      .background { fill: #0F172A; }
      .foreground { fill: #10B981; }
      .accent { fill: #34D399; }
    }
  </style>
  <rect class="background" width="180" height="180" rx="37" />
  <!-- Leaf shape for healthy/nutritional theme -->
  <g style="transform: translate(45, 35)">
    <!-- Apple silhouette with leaf -->
    <circle class="foreground" cx="45" cy="55" r="30" />
    <!-- Stem -->
    <rect class="foreground" x="43" y="20" width="4" height="35" rx="2" />
    <!-- Leaf -->
    <path class="accent" d="M 55 30 Q 75 25, 80 40 Q 75 45, 60 42 Z" />
  </g>
  <!-- CalorAI text below -->
  <text x="90" y="130" font-family="Arial, sans-serif" font-size="18" font-weight="bold" text-anchor="middle" class="foreground">CA</text>
</svg>